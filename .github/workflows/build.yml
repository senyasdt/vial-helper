name: build

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            runs_on: ubuntu-24.04
            artifact_name: vial-helperd-linux-x64
            binary_name: vial-helperd
            archive_name: vial-helperd-linux-x64.tar.gz
          - goos: windows
            goarch: amd64
            runs_on: windows-2025
            artifact_name: vial-helperd-windows-x64
            binary_name: vial-helperd.exe
            archive_name: vial-helperd-windows-x64.zip
          - goos: darwin
            goarch: arm64
            runs_on: macos-15
            artifact_name: vial-helperd-macos-arm64
            binary_name: vial-helperd
            archive_name: vial-helperd-macos-arm64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.0"

      - name: Install Linux build dependencies
        if: matrix.goos == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - name: Compute build metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::7}"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
            prerelease="false"
          else
            base_tag="$(git describe --tags --abbrev=0 --match 'v*' 2>/dev/null || true)"
            if [[ -n "${base_tag}" ]]; then
              base_version="${base_tag#v}"
            else
              base_version="0.1.0"
            fi
            version="${base_version}-dev.${GITHUB_RUN_NUMBER}+${short_sha}"
            prerelease="true"
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "commit=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "date=${build_date}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Build
        shell: bash
        env:
          CGO_ENABLED: "1"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          mkdir -p dist
          go build \
            -trimpath \
            -ldflags="-s -w -X 'github.com/example/vial-helper/internal/buildinfo.Version=${{ steps.meta.outputs.version }}' -X 'github.com/example/vial-helper/internal/buildinfo.Commit=${{ steps.meta.outputs.commit }}' -X 'github.com/example/vial-helper/internal/buildinfo.Date=${{ steps.meta.outputs.date }}'" \
            -o "dist/${{ matrix.binary_name }}" \
            ./cmd/vial-helperd

      - name: Package Unix artifact
        if: matrix.goos != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          staging="dist/${{ matrix.artifact_name }}"
          mkdir -p "${staging}"
          cp "dist/${{ matrix.binary_name }}" "${staging}/"
          cp README.md "${staging}/"
          tar -C dist -czf "dist/${{ matrix.archive_name }}" "${{ matrix.artifact_name }}"

      - name: Package Windows artifact
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          $staging = "dist/${{ matrix.artifact_name }}"
          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "dist/${{ matrix.binary_name }}" "$staging/${{ matrix.binary_name }}"
          Copy-Item "README.md" "$staging/README.md"
          Compress-Archive -Path "$staging/*" -DestinationPath "dist/${{ matrix.archive_name }}" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ steps.meta.outputs.version }}
          path: dist/${{ matrix.archive_name }}
          if-no-files-found: error

      - name: Publish release asset
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.archive_name }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
